<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Offer Letter Generation</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #F97316; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #ea580c; }
        .result { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 4px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Test Professional Offer Letter Generation</h1>
        <p>This test verifies that the MM Docs system generates professional offer letters with actual user data instead of placeholders.</p>
        
        <form id="offerForm">
            <div class="form-group">
                <label for="companyName">Company Name:</label>
                <input type="text" id="companyName" value="TechCorp India" required>
            </div>
            
            <div class="form-group">
                <label for="candidateName">Candidate Name:</label>
                <input type="text" id="candidateName" value="Priya Sharma" required>
            </div>
            
            <div class="form-group">
                <label for="position">Position:</label>
                <input type="text" id="position" value="Senior Software Engineer" required>
            </div>
            
            <div class="form-group">
                <label for="department">Department:</label>
                <input type="text" id="department" value="Engineering" required>
            </div>
            
            <div class="form-group">
                <label for="salary">Annual Salary (₹):</label>
                <input type="number" id="salary" value="1800000" required>
            </div>
            
            <div class="form-group">
                <label for="startDate">Start Date:</label>
                <input type="date" id="startDate" value="2024-03-15" required>
            </div>
            
            <div class="form-group">
                <label for="reportingTo">Reporting Manager:</label>
                <input type="text" id="reportingTo" value="Director of Engineering" required>
            </div>
            
            <div class="form-group">
                <label for="workLocation">Work Location:</label>
                <input type="text" id="workLocation" value="Bangalore Office" required>
            </div>
            
            <button type="submit">🚀 Generate Professional Offer Letter</button>
        </form>
        
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('offerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⏳ Generating offer letter...';
            resultDiv.className = 'result';
            
            try {
                // First login to get token
                const loginResponse = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'password123'
                    })
                });
                
                const loginData = await loginResponse.json();
                if (!loginResponse.ok) throw new Error(loginData.message);
                
                // Collect form data
                const formData = {
                    companyName: document.getElementById('companyName').value,
                    candidateName: document.getElementById('candidateName').value,
                    position: document.getElementById('position').value,
                    department: document.getElementById('department').value,
                    salary: document.getElementById('salary').value,
                    startDate: document.getElementById('startDate').value,
                    reportingTo: document.getElementById('reportingTo').value,
                    workLocation: document.getElementById('workLocation').value
                };
                
                // Create topic string (same format as frontend)
                const topic = `Generate a professional offer letter document for company: ${formData.companyName}, candidate: ${formData.candidateName}, position: ${formData.position}, salary: ₹${Number(formData.salary).toLocaleString()}. Additional details: department: ${formData.department}, start date: ${formData.startDate}, reporting to: ${formData.reportingTo}, work location: ${formData.workLocation}. Make it professional, comprehensive, and industry-standard.`;
                
                // Generate document
                const response = await fetch('http://localhost:5000/api/documents/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${loginData.token}`
                    },
                    body: JSON.stringify({
                        type: 'offer_letter',
                        topic: topic,
                        title: `Offer Letter - ${formData.candidateName}`
                    })
                });
                
                const result = await response.json();
                if (!response.ok) throw new Error(result.message);
                
                // Display success result
                const content = result.document.content;
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <h3>✅ Offer Letter Generated Successfully!</h3>
                    <p><strong>Document ID:</strong> ${result.document._id}</p>
                    <h4>📋 Extracted Data Verification:</h4>
                    <ul>
                        <li><strong>Company:</strong> ${content.companyName} ${content.companyName === formData.companyName ? '✅' : '❌'}</li>
                        <li><strong>Candidate:</strong> ${content.candidateName} ${content.candidateName === formData.candidateName ? '✅' : '❌'}</li>
                        <li><strong>Position:</strong> ${content.position} ${content.position === formData.position ? '✅' : '❌'}</li>
                        <li><strong>Department:</strong> ${content.department} ${content.department === formData.department ? '✅' : '❌'}</li>
                        <li><strong>Salary:</strong> ${content.salary} ${content.salary === formData.salary ? '✅' : '❌'}</li>
                        <li><strong>Start Date:</strong> ${content.startDate} ${content.startDate === formData.startDate ? '✅' : '❌'}</li>
                        <li><strong>Reporting To:</strong> ${content.reportingTo} ${content.reportingTo === formData.reportingTo ? '✅' : '❌'}</li>
                        <li><strong>Work Location:</strong> ${content.workLocation} ${content.workLocation === formData.workLocation ? '✅' : '❌'}</li>
                    </ul>
                    <p><strong>Preview URL:</strong> <a href="http://localhost:5000${result.previewUrl}?token=${loginData.token}" target="_blank">View Professional Document</a></p>
                `;
                
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Generation Failed</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
