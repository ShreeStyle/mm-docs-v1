services:
  # Backend API Service
  - type: web
    name: mmdocs-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install && cd client && npm install && npm run build && cd ..
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY_BACKUP
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
