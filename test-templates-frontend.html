<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Templates Frontend</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .template-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .error { color: red; background: #ffe6e6; padding: 10px; border-radius: 4px; }
        .success { color: green; background: #e6ffe6; padding: 10px; border-radius: 4px; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        .preview { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Template System Test</h1>
    
    <div id="status"></div>
    
    <h2>Authentication</h2>
    <div>
        <input type="email" id="email" placeholder="Email" value="test@example.com">
        <input type="password" id="password" placeholder="Password" value="password123">
        <button onclick="login()">Login</button>
        <button onclick="logout()">Logout</button>
    </div>
    
    <h2>Templates</h2>
    <button onclick="fetchTemplates()">Fetch Templates</button>
    <button onclick="fetchCategories()">Fetch Categories</button>
    
    <div id="templates-container"></div>
    
    <h2>Template Preview</h2>
    <div>
        <input type="text" id="templateId" placeholder="Template ID" value="offer-letter-001">
        <button onclick="previewTemplate()">Preview Template</button>
    </div>
    <div id="preview-container"></div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let authToken = localStorage.getItem('token');
        
        function updateStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.innerHTML = `<div class="${isError ? 'error' : 'success'}">${message}</div>`;
        }
        
        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {}),
                        ...options.headers
                    }
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || `HTTP ${response.status}`);
                }
                
                return data;
            } catch (error) {
                console.error('API Error:', error);
                updateStatus(`API Error: ${error.message}`, true);
                throw error;
            }
        }
        
        async function login() {
            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const response = await apiCall('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                
                authToken = response.token;
                localStorage.setItem('token', authToken);
                localStorage.setItem('user', JSON.stringify(response.user));
                
                updateStatus(`Login successful! User: ${response.user.name}`);
            } catch (error) {
                updateStatus(`Login failed: ${error.message}`, true);
            }
        }
        
        function logout() {
            authToken = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            updateStatus('Logged out successfully');
        }
        
        async function fetchTemplates() {
            try {
                const response = await apiCall('/templates');
                
                const container = document.getElementById('templates-container');
                container.innerHTML = '<h3>Templates:</h3>';
                
                if (response.success && response.data) {
                    response.data.forEach(template => {
                        const card = document.createElement('div');
                        card.className = 'template-card';
                        card.innerHTML = `
                            <h4>${template.icon} ${template.name}</h4>
                            <p><strong>Category:</strong> ${template.category}</p>
                            <p><strong>Description:</strong> ${template.description}</p>
                            <p><strong>Required Fields:</strong> ${template.requiredFields?.length || 0}</p>
                            <button onclick="previewTemplateById('${template.templateId}')">Preview</button>
                            <button onclick="useTemplate('${template.templateId}')">Use Template</button>
                        `;
                        container.appendChild(card);
                    });
                    
                    updateStatus(`Loaded ${response.data.length} templates successfully`);
                } else {
                    updateStatus('No templates found', true);
                }
            } catch (error) {
                updateStatus(`Failed to fetch templates: ${error.message}`, true);
            }
        }
        
        async function fetchCategories() {
            try {
                const response = await apiCall('/templates/categories');
                
                if (response.success && response.data) {
                    const categories = response.data.map(cat => 
                        `${cat.name}: ${cat.count} templates`
                    ).join(', ');
                    
                    updateStatus(`Categories: ${categories}`);
                } else {
                    updateStatus('No categories found', true);
                }
            } catch (error) {
                updateStatus(`Failed to fetch categories: ${error.message}`, true);
            }
        }
        
        async function previewTemplate() {
            const templateId = document.getElementById('templateId').value;
            await previewTemplateById(templateId);
        }
        
        async function previewTemplateById(templateId) {
            try {
                const response = await apiCall(`/templates/${templateId}`);
                
                const container = document.getElementById('preview-container');
                
                if (response.success && response.data) {
                    const template = response.data;
                    
                    // Sample data for preview
                    let content = template.content || 'No content available';
                    const sampleData = {
                        candidateName: 'John Doe',
                        employeeName: 'Jane Smith',
                        position: 'Software Engineer',
                        companyName: 'Tech Corp Ltd',
                        salary: '1200000',
                        startDate: '2024-04-01'
                    };
                    
                    // Replace placeholders
                    Object.keys(sampleData).forEach(key => {
                        const regex = new RegExp(`{{${key}}}`, 'g');
                        content = content.replace(regex, sampleData[key]);
                    });
                    
                    container.innerHTML = `
                        <h3>Preview: ${template.name}</h3>
                        <div class="preview">
                            <h4>Required Fields:</h4>
                            <ul>
                                ${template.requiredFields?.map(field => 
                                    `<li><strong>${field.label}</strong> (${field.fieldType})${field.required ? ' *' : ''}</li>`
                                ).join('') || '<li>No fields defined</li>'}
                            </ul>
                            
                            <h4>Document Content:</h4>
                            <div style="border: 1px solid #ccc; padding: 15px; background: white;">
                                ${content}
                            </div>
                        </div>
                    `;
                    
                    updateStatus(`Template ${templateId} loaded successfully`);
                } else {
                    updateStatus(`Template ${templateId} not found`, true);
                }
            } catch (error) {
                updateStatus(`Failed to preview template: ${error.message}`, true);
            }
        }
        
        function useTemplate(templateId) {
            updateStatus(`Would navigate to: /dashboard/create-document/${templateId}`);
            // In real app: window.location.href = `/dashboard/create-document/${templateId}`;
        }
        
        // Check if already logged in
        if (authToken) {
            updateStatus('Already logged in - you can fetch templates');
        } else {
            updateStatus('Please login first to access templates');
        }
    </script>
</body>
</html>
